<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="back()">
        <ion-icon name="arrow-back-outline" slot="start"></ion-icon>
        Volver
      </ion-button>
    </ion-buttons>

    <ion-title>Detalle</ion-title>

    <ion-buttons slot="end">
      <ion-button color="danger" (click)="confirmDelete()">
        <ion-icon name="trash-outline" slot="start"></ion-icon>
        Eliminar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p-toast appendTo="body"></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <ng-container *ngIf="item">
    <p-card header="Transacción">
      <div class="kv">
        <div><span class="k">Tipo:</span> <span class="v">{{ item.tipo | tipoLabel }}</span></div>
        <div><span class="k">Categoría:</span> <span class="v">{{ item.categoria | categoriaLabel }}</span></div>
        <div><span class="k">Monto:</span> <span class="v">{{ item.monto | moneyCop:item.tipo }}</span></div>
        <div><span class="k">Fecha:</span> <span class="v">{{ item.fecha | dateEs }}</span></div>
        <div *ngIf="item.nota"><span class="k">Nota:</span> <span class="v">{{ item.nota }}</span></div>
      </div>
    </p-card>

    <p-card header="Comprobantes" styleClass="mt">
      <app-photo-selector
        [disabled]="savingPhoto"
        (camera)="addFromCamera()"
        (gallery)="addFromGallery()"
      ></app-photo-selector>

      <div class="mini" *ngIf="(item.comprobantes?.length ?? 0) > 0; else empty">
        <div class="mini__grid">
          <img
            *ngFor="let f of item.comprobantes | slice:0:4"
            [src]="f.webViewPath"
            alt="Comprobante"
            (click)="openGallery()"
          />
        </div>

        <button
          pButton
          type="button"
          class="p-button-text"
          icon="pi pi-images"
          label="Ver galería"
          (click)="openGallery()"
        ></button>
      </div>

      <ng-template #empty>
        <p class="empty">Aún no hay fotos. Agrega un comprobante con cámara o galería.</p>
      </ng-template>
    </p-card>

    <app-photo-gallery-modal
      [(visible)]="galleryOpen"
      [title]="'Comprobantes'"
      [fotos]="item.comprobantes ?? []"
      (remove)="removeComprobante($event)"
    ></app-photo-gallery-modal>
  </ng-container>
</ion-content>
