<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p-toast appendTo="body"></p-toast>

  <p-card header="Iniciar sesión">
    <div class="form">
      <div class="field">
        <label>Email</label>
        <input pInputText type="email" [(ngModel)]="email" placeholder="correo@mail.com" />
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input pInputText type="password" [(ngModel)]="password" placeholder="••••••••" />
      </div>

      <div class="actions">
        <button
          pButton
          type="button"
          label="{{ loading ? 'Entrando...' : 'Entrar' }}"
          icon="pi pi-sign-in"
          [disabled]="loading"
          (click)="submit()"
        ></button>

        <button
          pButton
          type="button"
          label="Crear cuenta"
          class="p-button-outlined"
          (click)="goRegister()"
        ></button>
      </div>
    </div>
  </p-card>
</ion-content>
