<ion-header>
  <ion-toolbar>
    <ion-title>UI Playground</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <p-toast appendTo="body"></p-toast>

  <p-dialog header="Dialog OK" [(visible)]="showDialog" [modal]="true" [closable]="true" [dismissableMask]="true"
    [style]="{ width: '90vw', maxWidth: '420px' }" (onHide)="closeDialog()">
    <p>Si ves esto, el dialog funciona ✅</p>
    <div class="actions">
      <button pButton type="button" label="Cerrar" icon="pi pi-times" (click)="closeDialog()"></button>
    </div>
  </p-dialog>

  <div class="spacer"></div>

  <!-- =========================
       Parte 2: Core Smoke Test
       ========================= -->
  <p-card header="Parte 2 (Core) - Smoke Test">
    <p class="muted">
      Esto prueba: Auth (register/login/logout), Transacciones (CRUD mínimo), Analytics (saldo + mes + categorías),
      y persistencia en localStorage.
    </p>

    <div class="grid">
      <div class="field">
        <label>Register - Nombre</label>
        <input pInputText [(ngModel)]="regNombre" placeholder="Nombre" />
      </div>

      <div class="field">
        <label>Register - Email</label>
        <input pInputText [(ngModel)]="regEmail" placeholder="Email" />
      </div>

      <div class="field">
        <label>Register - Password</label>
        <input pInputText type="password" [(ngModel)]="regPass" placeholder="Password" />
      </div>

      <div class="actions">
        <button pButton type="button" label="Register" icon="pi pi-user-plus" (click)="doRegister()"></button>
      </div>

      <hr />

      <div class="field">
        <label>Login - Email</label>
        <input pInputText [(ngModel)]="loginEmail" placeholder="Email" />
      </div>

      <div class="field">
        <label>Login - Password</label>
        <input pInputText type="password" [(ngModel)]="loginPass" placeholder="Password" />
      </div>

      <div class="actions">
        <button pButton type="button" label="Login" icon="pi pi-sign-in" (click)="doLogin()"></button>
        <button pButton type="button" label="Logout" icon="pi pi-sign-out" class="p-button-outlined"
          (click)="doLogout()"></button>
      </div>

      <hr />

      <div class="actions">
        <button pButton type="button" label="+ 2 transacciones demo" icon="pi pi-plus"
          (click)="seed2Transacciones()"></button>

        <button pButton type="button" label="Wipe local (mw_*)" icon="pi pi-trash"
          class="p-button-danger p-button-outlined" (click)="wipeLocal()"></button>
      </div>
    </div>

    <div class="spacer"></div>

    <p-card header="Auth Snapshot">
      <pre>{{ authSnapshot | json }}</pre>
    </p-card>

    <div class="spacer"></div>

    <p-card header="Resumen Financiero Snapshot">
      <pre>{{ resumenSnapshot | json }}</pre>
    </p-card>

    <div class="spacer"></div>

    <p-card header="Transacciones Snapshot (orden desc por fecha)">
      <pre>{{ transaccionesSnapshot | json }}</pre>
    </p-card>
  </p-card>
</ion-content>
